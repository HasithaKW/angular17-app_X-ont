<!-- Login page replacing Global.asax Session_Start hardcoded credentials -->
<div class="login-wrapper">
  <div class="login-box">

    <div class="login-header">
      <h2 class="login-title">XONT Ventura</h2>
      <p class="login-subtitle">SOMNT24 — Return Type Management</p>
    </div>

    @if (errorMsg()) {
      <div class="alert-bar error">{{ errorMsg() }}</div>
    }

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="field-row">
        <label class="Captionstyle" for="userName">Username</label>
        <input type="text"
               id="userName"
               name="userName"
               [(ngModel)]="credentials.userName"
               class="Textboxstyle login-input"
               required
               autocomplete="username"
               placeholder="Enter username" />
      </div>

      <div class="field-row">
        <label class="Captionstyle" for="password">Password</label>
        <input type="password"
               id="password"
               name="password"
               [(ngModel)]="credentials.password"
               class="Textboxstyle login-input"
               required
               autocomplete="current-password"
               placeholder="Enter password" />
      </div>

      <div class="btn-row">
        <button type="submit"
                class="MainButtonStyle"
                [disabled]="loginForm.invalid || isLoading()">
          {{ isLoading() ? 'Signing in...' : 'Sign In' }}
        </button>
      </div>
    </form>

  </div>
</div>
